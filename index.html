<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Disney Cards</title>

    <!-- 📌 CSS link -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header>
        <!-- 🌐 Simple Navbar -->
        <nav>
            <h1>Disney Character Cards</h1>
        </nav>
    </header>

    <main class="container">

        <!-- 📦 THIS is where JS will inject ALL cards -->
        <div id="card-container" class="row"></div>

        <!-- 🧾 TEMPLATE CARD (hidden, used for cloning only) -->
        <div class="card col-3 d-none" id="card-template">
            <img class="card-img-top img-character" src="" alt="" />

            <div class="card-body">
                <h4 class="character-name"></h4>
                <p class="info-movie"></p>
                <p class="info-role"></p>
                <p class="info-personality"></p>
                <p class="info-alignment"></p>
            </div>
        </div>

    </main>

    <footer>
        <!-- place footer here -->
    </footer>

    <!-- 📌 JS link -->
    <script src="script.js"></script>
</body>
</html>
