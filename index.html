<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Disney Cards</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Magic font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Dancing+Script:wght@500;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

    <!-- 📌 Your CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>
  
    <header class="site-header pb-4">
        <nav class="navbar navbar-expand-lg navbar-light py-3">
            <div class="container-fluid">
                <a class="navbar-brand fs-2 fw-bold" href="#">Disney Characters</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#siteNav" aria-controls="siteNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="siteNav">
                    <ul class="navbar-nav ms-auto gap-2">
                        <li class="nav-item"><a class="nav-link active" aria-current="page" href="#">Home</a></li>
                        <li class="nav-item"><a class="nav-link" href="#">Characters</a></li>
                        <li class="nav-item"><a class="nav-link" href="#">Movies</a></li>
                        <li class="nav-item"><a class="nav-link" href="#">Favorites</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="container mt-4">

      
        <div id="card-container" class="card-grid"></div>

        <div class="modal fade" id="characterModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-header">
        <h5 id="modalName" class="modal-title"></h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <img id="modalImg" class="img-fluid mb-3 rounded-3 shadow-sm" alt="Character image">

        <p id="modalRole" class="mb-1"></p>
        <p id="modalSpecies" class="mb-1"></p>
        <p id="modalAlignment" class="mb-1"></p>

        <div id="modalMovie" class="bg-primary text-white p-2 mt-3 rounded"></div>
    
      </div>

    </div>
  </div>
</div>
    
    </main>

    <footer>
        <!-- place footer here -->
    </footer>

    <!-- 📌 JS link -->
     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
      <script src="character-info.js"></script>
    <script src="script.js"></script>
</body>
</html>
