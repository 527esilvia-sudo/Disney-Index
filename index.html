<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Disney Cards</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- 📌 Your CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>
  
    <header>
        <!-- 🌐 Simple Navbar -->
        <nav>
            <h1>Disney Character Cards</h1>
        </nav>
    </header>

    <main class="container">

      
        <div id="card-container" class="row"></div>

        <div class="modal fade" id="characterModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-header">
        <h5 id="modalName" class="modal-title"></h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <img id="modalImg" class="img-fluid mb-3">

         <p id="modalName"></p>
        <p id="modalRole"></p>
        <p id="modalSpecies"></p>
        <p id="modalAlignment"></p>

        <div id="modalMovie" class="bg-primary text-white p-2 mt-3"></div>
    
      </div>

    </div>
  </div>
</div>
    
    </main>

    <footer>
        <!-- place footer here -->
    </footer>

    <!-- 📌 JS link -->
     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
      <script src="character-info.js"></script>
    <script src="script.js"></script>
</body>
</html>
